name: Auto-Version & Build Plugins

on:
  push:
    branches: [ "main" ]
    paths:
      - 'plugins/**'

permissions:
  contents: write

jobs:
  version-and-build:
    runs-on: [self-hosted, linux, x64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required to diff the last commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process, Version, and Build Changed Plugins
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # 1. Find changed plugin directories
          CHANGED_DIRS=$(git diff --name-only HEAD^ HEAD | grep '^plugins/' | cut -d/ -f1,2 | sort -u)

          for DIR in $CHANGED_DIRS; do
            PLUGIN_NAME=$(basename $DIR)
            MANIFEST="$DIR/manifest.json"
            UI_DIR="$DIR/ui"
            STATIC_DIR="$DIR/static"

            if [ ! -f "$MANIFEST" ]; then
              continue
            fi

            echo "========================================"
            echo "⚙️ Processing Plugin: $PLUGIN_NAME"
            echo "========================================"

            # 2. Embedded Python script to handle Semantic Versioning math
            RESULT=$(python3 -c '
            import sys, json, re

            plugin_name = sys.argv[1]
            manifest_path = sys.argv[2]
            commit_msg = sys.argv[3]

            with open(manifest_path, "r") as f:
                manifest = json.load(f)

            current_version = manifest.get("version", "0.0.0")
            major, minor, patch = map(int, current_version.split("."))

            build_type = "beta"
            is_stable_release = "[release-plugins]" in commit_msg

            # Check for explicit override (e.g., spotify:v1.5.0)
            override_match = re.search(rf"{plugin_name}:v(\d+\.\d+\.\d+)", commit_msg, re.IGNORECASE)

            if override_match:
                new_version = override_match.group(1)
                build_type = "stable"
            elif is_stable_release:
                # Only bump minor if beta updates occurred (patch > 0)
                if patch > 0 or current_version == "0.0.0":
                    if minor == 9:
                        major += 1
                        minor = 0
                    else:
                        minor += 1
                    patch = 0
                new_version = f"{major}.{minor}.{patch}"
                build_type = "stable"
            else:
                # Standard Beta Increment
                patch += 1
                new_version = f"{major}.{minor}.{patch}"
                build_type = "beta"

            # Save updated manifest
            manifest["version"] = new_version
            with open(manifest_path, "w") as f:
                json.dump(manifest, f, indent=2)

            print(f"{build_type},{new_version}")
                        ' "$PLUGIN_NAME" "$MANIFEST" "$COMMIT_MSG")

                        # Parse Python output
                        BUILD_TYPE=$(echo "$RESULT" | cut -d',' -f1)
                        NEW_VERSION=$(echo "$RESULT" | cut -d',' -f2)

                        echo "✅ Version updated to $NEW_VERSION ($BUILD_TYPE build)"

                        # 3. Build UI if it exists
                        if [ -d "$UI_DIR" ]; then
                        mkdir -p "$STATIC_DIR"
                        cd "$UI_DIR"
                        npm install
                        npm run build
                        cd ../../../
                        
                        if [ "$BUILD_TYPE" = "beta" ]; then
                            mv "$STATIC_DIR/bundle.js" "$STATIC_DIR/bundle.beta.js"
                            echo "📦 Saved as bundle.beta.js"
                        else
                            echo "📦 Saved as bundle.js (Stable)"
                        fi
                        else
                        echo "ℹ️ No UI directory found. Backend-only version bump applied."
                        fi
                    done

                - name: Commit Assets Back to Repo
                    uses: stefanzweifel/git-auto-commit-action@v5
                    with:
                    commit_message: "chore(plugins): auto-versioning and component build"
                    file_pattern: 'plugins/**/static/*.js plugins/**/manifest.json'