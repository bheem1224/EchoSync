version: '3.8'

services:
  soulsync:
    # build locally by default (comment out image line if using remote)
    build: .
    image: boulderbadgedad/soulsync:latest
    container_name: soulsync-webui
    environment:
      # User/Group ID configuration
      - PUID=1000
      - PGID=1000
      - UMASK=022
      # Web server configuration
      - FLASK_ENV=production
      - PYTHONPATH=/app
      # Set the config directory for settings and encrypted secrets
      - SOULSYNC_CONFIG_DIR=/config
      # Set the data directory for database and logs
      - SOULSYNC_DATA_DIR=/data
      # Set timezone (override as needed)
      - TZ=America/New_York
      # Logging verbosity (INFO, DEBUG, etc.)
      - SOULSYNC_LOG_LEVEL=INFO
    ports:
      - "8008:8008"      # Main web app
      - "8888:8888"      # Spotify OAuth callback
      - "8889:8889"      # Tidal OAuth callback
    volumes:
      # Configuration and encrypted secrets
      - ./config:/config
      # Persistent data, logs, downloads
      - ./data:/data
      # IMPORTANT: Mount the drives containing your download and transfer folders
      # If your download/transfer paths are on E: drive, mount E: drive:
      - /mnt/e:/host/mnt/e:rw
      # Mount H: drive for transfer folder
      - /mnt/h:/host/mnt/h:rw
      # If your download/transfer paths are on C: drive, uncomment this line:
      # - /mnt/c:/host/mnt/c:rw
      # If your download/transfer paths are on D: drive, uncomment this line:
      # - /mnt/d:/host/mnt/d:rw
      # Add additional drive mounts as needed for your specific setup
      # Optional: Mount your music library for Plex/Jellyfin access
      - /path/to/your/music:/music:ro
    extra_hosts:
      # Allow container to reach host services
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

# Named volumes are not used in this configuration.
# The 'data' volume is mapped to a local directory in the service definition.

# Optional: Add external network for communication with other containers
networks:
  default:
    name: soulsync-network