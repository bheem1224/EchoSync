version: '3.8'

# The legacy `legacy/` directory and backend_entry.py have been removed;
# Docker builds now install dependencies from the project's pyproject.toml.

services:
  backend:
    build: .
    image: echosync:latest
    container_name: echosync_backend
    environment:
      # User/Group ID configuration (backend_entry.py is gone, the service now
      # launches `run_api.py` directly as in the Dockerfile)
      - PUID=1000
      - PGID=1000
      - UMASK=022
      # API server configuration
      - UVICORN_PORT=5000
      - PYTHONPATH=/app
      # Set the config directory for settings and encrypted secrets
      - ECHOSYNC_CONFIG_DIR=/config
      # Set the data directory for database and logs
      - ECHOSYNC_DATA_DIR=/data
      # Set timezone
      - TZ=America/New_York
    ports:
      - "5000:5000"      # Main web app
      - "8888:8888"      # Spotify OAuth callback
      - "8889:8889"      # Tidal OAuth callback
    volumes:
      # Configuration and encrypted secrets
      - ./config:/config
      # Persistent data, logs, downloads
      - ./data:/data
      # IMPORTANT: Mount the drives containing your download and transfer folders
      # Example for Windows:
      # - "E:/Downloads:/downloads"
      # Example for Linux/macOS:
      # - "/path/to/your/downloads:/downloads"
    extra_hosts:
      # Allow container to reach host services
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - echosync-network

  frontend:
    image: node:20-slim
    container_name: echosync_frontend
    ports:
      - "5173:5173"
    working_dir: /app/webui
    volumes:
      - ./webui:/app/webui
    command: npm run dev
    depends_on:
      - backend
    networks:
      - echosync-network

networks:
  echosync-network:
    driver: bridge
