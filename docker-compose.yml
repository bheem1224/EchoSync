version: "3.8"

services:
  soulsync:
    build: .
    container_name: soulsync
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - UMASK=022
      - SOULSYNC_LOG_LEVEL=INFO
    ports:
      - "5000:5000" # Web UI & API
      - "8888:8888" # Spotify Callback
      - "8889:8889" # Tidal Callback
    volumes:
      - ./config:/config
      - ./data:/data
      - /mnt/user/media/music:/music # Example host path
      - /mnt/user/downloads/soulsync:/downloads # Example host path
    # Optional: Network mode host is often easier for local discovery
    # network_mode: host
